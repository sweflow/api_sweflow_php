# ============================================================
# Nginx — Sweflow API (https://api.typper.shop)
#
# Instalação:
#   sudo cp scripts/nginx/api.typper.shop.conf /etc/nginx/sites-available/api.typper.shop
#   sudo ln -s /etc/nginx/sites-available/api.typper.shop /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ── Real IP (anti-spoofing) ───────────────────────────────
# Aceita X-Forwarded-For apenas de IPs confiáveis (Cloudflare + loopback).
# Impede que atacantes forjem o IP real via header.
# IPs Cloudflare: https://www.cloudflare.com/ips/
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
set_real_ip_from 127.0.0.1;
real_ip_header CF-Connecting-IP;

# ── Log format estruturado para Fail2Ban ─────────────────
# Inclui status HTTP e IP real — Fail2Ban filtra por status 429/401/403
log_format sweflow_security '$remote_addr - [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_user_agent" "$http_cf_connecting_ip"';

# ── Rate limiting zones (DDoS / brute-force) ─────────────
limit_req_zone $binary_remote_addr zone=api_global:20m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=2r/s;
limit_req_zone $binary_remote_addr zone=api_public:10m rate=5r/s;

# Limita conexões simultâneas por IP
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ── Redireciona HTTP → HTTPS ─────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.typper.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.typper.shop;

    # ── SSL (Let's Encrypt via Certbot) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/api.typper.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.typper.shop/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:20m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_dhparam               /etc/letsencrypt/ssl-dhparams.pem;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Proteção DDoS ────────────────────────────────────
    # Máximo de conexões simultâneas por IP
    limit_conn conn_per_ip 30;

    # Rate limit global aplicado a todas as rotas
    limit_req zone=api_global burst=30 nodelay;
    limit_req_status 429;
    limit_conn_status 429;

    # Log estruturado para Fail2Ban
    access_log /var/log/nginx/api.typper.shop.access.log sweflow_security;
    error_log  /var/log/nginx/api.typper.shop.error.log warn;

    # Rejeita body muito grande antes de chegar ao PHP (padrão para API)
    client_max_body_size 1m;

    # Timeouts agressivos para liberar workers rapidamente sob ataque
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;

    # ── Compressão ───────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types application/json application/javascript text/css text/plain application/xml;

    # ── Headers de segurança ─────────────────────────────
    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
    # CSP para API pura — bloqueia tudo, sem exceções
    add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'"  always;

    # ── Bloqueia métodos HTTP não utilizados ─────────────
    if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) {
        return 405;
    }

    # ── Bloqueia acesso a arquivos sensíveis ─────────────
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~ \.(json|lock|md|sh|sql|yml|yaml)$ {
        deny all;
        return 404;
    }

    # ── Endpoints de autenticação — rate limit mais restrito ──
    location ~ ^/api/(auth/login|login|auth/recuperacao-senha|auth/resetar-senha|recuperar-senha|registrar|criar/usuario|auth/reenviar-verificacao) {
        limit_req zone=api_auth burst=5 nodelay;
        client_max_body_size 64k;

        proxy_pass         http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-API-KEY         $http_x_api_key;
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 10s;
        proxy_send_timeout    15s;
        proxy_read_timeout    15s;
    }

    # ── Upload de imagem — limite maior só aqui ───────────
    location /api/perfil/upload {
        limit_req zone=api_public burst=3 nodelay;
        client_max_body_size 6m;

        proxy_pass         http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-API-KEY         $http_x_api_key;
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_request_buffering off;
    }

    # ── Arquivos estáticos — cache agressivo, sem PHP ─────
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2|woff|ttf|webp)$ {
        root /var/www/api.typper.shop/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # ── Proxy geral para o PHP ────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3005;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header X-API-KEY         $http_x_api_key;
        proxy_hide_header X-Powered-By;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Buffer de resposta — evita que workers PHP fiquem presos esperando cliente lento
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 16k;
    }
}
