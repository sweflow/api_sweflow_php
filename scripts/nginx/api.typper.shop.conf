# ============================================================
# Nginx — Sweflow API (https://api.typper.shop)
#
# Instalação:
#   sudo cp scripts/nginx/api.typper.shop.conf /etc/nginx/sites-available/api.typper.shop
#   sudo ln -s /etc/nginx/sites-available/api.typper.shop /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ── Redireciona HTTP → HTTPS ─────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.typper.shop;

    # Redireciona todo HTTP para HTTPS (301 permanente)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.typper.shop;

    # ── SSL (Let's Encrypt via Certbot) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/api.typper.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.typper.shop/privkey.pem;

    # TLS hardening — desativa TLS 1.0 e 1.1 (BEAST, FREAK, POODLE)
    # Substitui o options-ssl-nginx.conf padrão do Certbot
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_dhparam               /etc/letsencrypt/ssl-dhparams.pem;

    # OCSP Stapling — melhora performance e privacidade
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Headers de segurança ─────────────────────────────
    # HSTS com preload — força HTTPS por 1 ano em todos os subdomínios
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Previne clickjacking
    add_header X-Frame-Options "DENY" always;

    # Previne MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Controla informações de referência
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restringe acesso a APIs do browser
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;

    # CSP — API JSON pura: bloqueia tudo exceto same-origin
    # O PHP já envia este header; o Nginx garante mesmo em respostas de erro (40x/50x)
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # Remove header que expõe versão do Nginx
    server_tokens off;

    # ── Proxy para PHP built-in server ───────────────────
    location / {
        proxy_pass         http://127.0.0.1:3005;
        proxy_http_version 1.1;

        # Headers essenciais para o PHP detectar HTTPS e IP real
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Evita que o Nginx duplique headers já enviados pelo PHP
        proxy_hide_header X-Powered-By;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer para uploads de imagem (perfil)
        client_max_body_size 20M;
        proxy_request_buffering off;
    }

    # ── Bloqueia acesso direto a arquivos sensíveis ───────
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~ \.(json|lock|md|sh|sql|yml|yaml)$ {
        deny all;
        return 404;
    }
}
