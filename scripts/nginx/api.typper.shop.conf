# ============================================================
# Nginx — Sweflow API (https://api.typper.shop)
#
# Instalação:
#   sudo cp scripts/nginx/api.typper.shop.conf /etc/nginx/sites-available/api.typper.shop
#   sudo ln -s /etc/nginx/sites-available/api.typper.shop /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name api.typper.shop;

    # Redireciona todo HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.typper.shop;

    # ── SSL (Let's Encrypt via Certbot) ──────────────────
    ssl_certificate     /etc/letsencrypt/live/api.typper.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.typper.shop/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Headers de segurança ─────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── Proxy para PHP built-in server ───────────────────
    location / {
        proxy_pass         http://127.0.0.1:3005;
        proxy_http_version 1.1;

        # Headers essenciais para o PHP detectar HTTPS e IP real
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer para uploads de imagem (perfil)
        client_max_body_size 20M;
        proxy_request_buffering off;
    }
}
