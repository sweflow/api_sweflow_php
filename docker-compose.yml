version: "3.9"

# ============================================================
# Vupi.us API — Docker Compose
#
# Serviços disponíveis:
#   postgres         — PostgreSQL 15 (banco principal — DB_*)
#   postgres-modules — PostgreSQL 15 (banco secundário — DB2_*)
#   mysql            — MySQL 8.0 (alternativo)
#   adminer          — Interface web para gerenciar os bancos
#
# Uso rápido:
#   docker compose up -d postgres                    # só banco principal
#   docker compose up -d postgres postgres-modules   # ambos os PostgreSQL
#   docker compose up -d mysql                       # só MySQL
#   docker compose up -d postgres adminer            # PostgreSQL + UI
#   docker compose up -d                             # tudo
#
# Acesso Adminer: http://localhost:8080
# ============================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vupi.us_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NOME:-vupi_db}
      POSTGRES_USER:     ${DB_USUARIO:-admin}
      POSTGRES_PASSWORD: ${DB_SENHA:-123456}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Executa o schema inicial ao criar o container pela primeira vez
      - ./src/Kernel/Database/vupi_db_2026-03-02_013709.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./src/Kernel/Database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USUARIO:-admin} -d ${DB_NOME:-vupi_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vupi.us_net

  # ── PostgreSQL (modules — segunda conexão DB2) ─────────
  postgres-modules:
    image: postgres:15-alpine
    container_name: vupi.us_postgres_modules
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB2_NOME:-vupi_modules_db}
      POSTGRES_USER:     ${DB2_USUARIO:-admin}
      POSTGRES_PASSWORD: ${DB2_SENHA:-123456}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES2_PORT:-5433}:5432"
    volumes:
      - postgres_modules_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB2_USUARIO:-admin} -d ${DB2_NOME:-vupi_modules_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vupi.us_net

  # ── MySQL ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: vupi.us_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      ${DB_NOME:-vupi_db}
      MYSQL_USER:          ${DB_USUARIO:-admin}
      MYSQL_PASSWORD:      ${DB_SENHA:-123456}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_vupi.us_2024}
      TZ:                  ${APP_TIMEZONE:-America/Bahia}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${DB_USUARIO:-admin}", "-p${DB_SENHA:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vupi.us_net

  # ── Adminer (UI para ambos os bancos) ───────────────────
  adminer:
    image: adminer:4-standalone
    container_name: vupi.us_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN:         pepa-linha
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vupi.us_net

# ── Volumes persistentes ─────────────────────────────────
volumes:
  postgres_data:
    driver: local
  postgres_modules_data:
    driver: local
  mysql_data:
    driver: local

# ── Rede interna ─────────────────────────────────────────
networks:
  vupi.us_net:
    driver: bridge
