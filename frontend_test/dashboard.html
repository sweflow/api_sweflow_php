<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Sweflow Frontend Test</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>

<div class="dash-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon"><i class="fa-solid fa-bolt"></i></div>
            <div>
                <div class="sidebar-brand-name">Sweflow</div>
                <div class="sidebar-brand-sub">Frontend Test</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Geral</div>
            <button class="nav-item active" data-section="perfil">
                <i class="fa-solid fa-circle-user"></i> Meu Perfil
            </button>
            <button class="nav-item" data-section="token">
                <i class="fa-solid fa-key"></i> Token de Acesso
            </button>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-avatar" id="sidebar-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div>
                    <div class="sidebar-user-name" id="sidebar-name">—</div>
                    <span class="sidebar-user-level" id="sidebar-level">—</span>
                </div>
            </div>
            <button type="button" class="btn btn-danger" id="logout-btn" style="width:100%;">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </button>
        </div>
    </aside>

    <!-- Main -->
    <div class="main">

        <!-- Topbar -->
        <header class="topbar">
            <div>
                <div class="topbar-title" id="topbar-title">Meu Perfil</div>
                <div class="topbar-sub" id="topbar-sub">Dados da sua conta</div>
            </div>
            <button class="btn btn-ghost" id="refresh-btn">
                <i class="fa-solid fa-rotate-right"></i> Atualizar
            </button>
        </header>

        <!-- Content -->
        <main class="content" id="content">
            <div class="loading-overlay">
                <span class="spinner" style="border-color:rgba(79,70,229,0.3);border-top-color:var(--brand);"></span>
                Carregando...
            </div>
        </main>

    </div>
</div>

<!-- Template: Perfil -->
<template id="tpl-perfil">
    <div class="fade-in">
        <img class="perfil-capa" style="width:100%;height:90px;object-fit:cover;border-radius:10px;border:1px solid var(--border);margin-bottom:20px;" hidden>
        <div class="card">
            <div class="profile-hero">
                <div class="profile-avatar-lg"></div>
                <div>
                    <div class="profile-name"></div>
                    <div class="profile-username"></div>
                    <span class="sidebar-user-level"></span>
                </div>
            </div>
            <div class="profile-grid">
                <div class="profile-field">
                    <div class="profile-field-label"><i class="fa-solid fa-envelope"></i> E-mail</div>
                    <div class="profile-field-value pf-email"></div>
                </div>
                <div class="profile-field">
                    <div class="profile-field-label"><i class="fa-solid fa-circle-check"></i> Status</div>
                    <div class="profile-field-value pf-status"></div>
                </div>
                <div class="profile-field">
                    <div class="profile-field-label"><i class="fa-solid fa-shield-check"></i> E-mail verificado</div>
                    <div class="profile-field-value pf-verificado"></div>
                </div>
                <div class="profile-field">
                    <div class="profile-field-label"><i class="fa-solid fa-calendar"></i> Membro desde</div>
                    <div class="profile-field-value pf-criado"></div>
                </div>
                <div class="profile-field pf-bio-wrap" style="grid-column:1/-1" hidden>
                    <div class="profile-field-label"><i class="fa-solid fa-quote-left"></i> Biografia</div>
                    <div class="profile-field-value pf-bio"></div>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- Template: Token -->
<template id="tpl-token">
    <div class="fade-in">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-key"></i> Access Token JWT</div>
            <p style="font-size:0.88rem;color:var(--text-muted);margin-bottom:14px;">
                Este é o token enviado no header <code style="color:var(--brand-light)">Authorization: Bearer ...</code> em cada requisição.
            </p>
            <div class="token-box" id="token-box">
                <span class="token-value"></span>
                <button class="copy-btn" id="copy-btn"><i class="fa-solid fa-copy"></i> Copiar</button>
            </div>
            <div class="stats-row token-info" style="margin-top:20px;" hidden>
                <div class="stat-card">
                    <div class="stat-icon purple"><i class="fa-solid fa-user-tag"></i></div>
                    <div>
                        <div class="stat-value tk-nivel" style="font-size:1rem;"></div>
                        <div class="stat-label">Nível de acesso</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fa-solid fa-clock"></i></div>
                    <div>
                        <div class="stat-value tk-iat" style="font-size:0.85rem;"></div>
                        <div class="stat-label">Emitido em</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon amber"><i class="fa-solid fa-hourglass-end"></i></div>
                    <div>
                        <div class="stat-value tk-exp" style="font-size:0.85rem;"></div>
                        <div class="stat-label">Expira em</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>

<script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
