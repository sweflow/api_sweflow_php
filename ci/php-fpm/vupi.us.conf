; ============================================================
; PHP-FPM pool — Vupi.us API
;
; Instalação:
;   sudo cp ci/php-fpm/vupi.us.conf /etc/php/8.2/fpm/pool.d/vupi.us.conf
;   sudo systemctl restart php8.2-fpm
;
; Caddy aponta para: unix:/run/php/vupi.us.sock
; ============================================================

[vupi.us]

; ── Usuário ──────────────────────────────────────────────
user  = www-data
group = www-data

; ── Socket Unix (mais rápido que TCP para comunicação local) ─
listen = /run/php/vupi.us.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; ── Gerenciamento de workers ──────────────────────────────
; dynamic: ajusta workers conforme demanda (recomendado para produção)
pm = dynamic

; Máximo de workers simultâneos
; Regra: (RAM disponível - 100MB) / ~30MB por worker
; Ex: 1GB RAM → (1024 - 100) / 30 ≈ 30 workers
pm.max_children      = 20

; Workers sempre ativos (prontos para receber requests)
pm.start_servers     = 4

; Mínimo de workers ociosos
pm.min_spare_servers = 2

; Máximo de workers ociosos (mata excesso)
pm.max_spare_servers = 8

; Recicla workers após N requests (evita memory leaks)
pm.max_requests      = 500

; ── Timeouts ─────────────────────────────────────────────
request_terminate_timeout = 60s
request_slowlog_timeout   = 5s

; ── Logs ─────────────────────────────────────────────────
slowlog                   = /var/log/php-fpm/vupi.us-slow.log
access.log                = /var/log/php-fpm/vupi.us-access.log
access.format             = "%R - %u %t \"%m %r\" %s %f %{mili}dms %{kilo}MMB"

; ── OPcache (garante que está ativo para este pool) ───────
php_admin_value[opcache.enable]            = 1
php_admin_value[opcache.memory_consumption] = 128
php_admin_value[opcache.max_accelerated_files] = 10000
php_admin_value[opcache.validate_timestamps]   = 0
php_admin_value[opcache.revalidate_freq]       = 0

; ── Segurança ─────────────────────────────────────────────
php_admin_value[expose_php]      = Off
php_admin_value[display_errors]  = Off
php_admin_value[log_errors]      = On
php_admin_value[error_log]       = /var/log/php-fpm/vupi.us-error.log
php_admin_value[memory_limit]    = 256M
php_admin_value[max_execution_time] = 60
