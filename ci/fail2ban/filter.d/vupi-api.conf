# Fail2Ban filter — PHP app: brute force e eventos de segurança
# Filtra logs JSON emitidos pelo AuditLogger e RateLimitMiddleware no stderr
#
# Formato esperado no log:
#   {"timestamp":"...","type":"AUDIT","evento":"auth.login.failed","ip":"1.2.3.4",...}
#   {"timestamp":"...","type":"SECURITY_ALERT","alert":"BRUTE_FORCE_DETECTED","dados":{"ip":"1.2.3.4",...}}
#   {"timestamp":"...","type":"SECURITY_RESPONSE","status":401,"ip":"1.2.3.4",...}

[Definition]
failregex = "ip"\s*:\s*"<HOST>".*"evento"\s*:\s*"auth\.login\.failed"
            "ip"\s*:\s*"<HOST>".*"alert"\s*:\s*"BRUTE_FORCE_DETECTED"
            "ip"\s*:\s*"<HOST>".*"event"\s*:\s*"http\.(unauthorized|forbidden)"

ignoreregex =
