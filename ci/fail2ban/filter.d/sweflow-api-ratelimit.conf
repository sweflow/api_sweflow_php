# Fail2Ban filter — PHP app: rate limit excedido
# Filtra logs JSON do RateLimitMiddleware
#
# Formato esperado:
#   {"timestamp":"...","type":"RATE_LIMIT_EXCEEDED","ip":"1.2.3.4",...}

[Definition]
failregex = "ip"\s*:\s*"<HOST>".*"type"\s*:\s*"RATE_LIMIT_EXCEEDED"
            "type"\s*:\s*"RATE_LIMIT_EXCEEDED".*"ip"\s*:\s*"<HOST>"

ignoreregex =
