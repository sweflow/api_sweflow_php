# Fail2Ban filter — PHP app: bots bloqueados (User-Agent + honeypot)
#
# Formato esperado:
#   {"timestamp":"...","type":"BOT_BLOCKED","ip":"1.2.3.4",...}
#   {"timestamp":"...","type":"BOT_HONEYPOT","ip":"1.2.3.4",...}

[Definition]
failregex = "ip"\s*:\s*"<HOST>".*"type"\s*:\s*"BOT_BLOCKED"
            "type"\s*:\s*"BOT_BLOCKED".*"ip"\s*:\s*"<HOST>"
            "ip"\s*:\s*"<HOST>".*"type"\s*:\s*"BOT_HONEYPOT"
            "type"\s*:\s*"BOT_HONEYPOT".*"ip"\s*:\s*"<HOST>"

ignoreregex =
