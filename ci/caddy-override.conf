# Arquivo de override do systemd para o Caddy
# Faz o Caddy carregar as variáveis do .env da API automaticamente
#
# Instalação (rode no servidor):
#   sudo mkdir -p /etc/systemd/system/caddy.service.d/
#   sudo cp ci/caddy-override.conf /etc/systemd/system/caddy.service.d/override.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart caddy
#
# ATENÇÃO: ajuste o caminho abaixo para o diretório real do projeto no servidor

[Service]
# Carrega as variáveis do .env — o Caddy usa {$APP_PORT}, {$APP_HOST}, {$APP_URL}
EnvironmentFile=/root/api_sweflow_php/.env

# Garante que o Caddy use o Caddyfile do projeto
ExecStart=
ExecStart=/usr/bin/caddy run --environ --config /root/api_sweflow_php/Caddyfile --adapter caddyfile
ExecReload=
ExecReload=/usr/bin/caddy reload --config /root/api_sweflow_php/Caddyfile --adapter caddyfile --force
